<svg width="600" height="560" viewBox="0 0 600 560" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="560" rx="40" fill="#E5DFD0"/>

  <!-- sky bits -->
  <g stroke="#15224A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M70 90 l0 28 M56 104 l28 0"/>
    <path d="M512 150 l0 22 M501 161 l22 0"/>
    <path d="M120 200 q14 -16 28 0 q14 -16 28 0"/>
  </g>
  <circle cx="470" cy="78" r="5" fill="#15224A"/>
  <circle cx="92" cy="158" r="4" fill="#15224A"/>

  <!-- cloud -->
  <path d="M430 230 q-6 -34 30 -32 q10 -26 40 -12 q30 -6 28 24 q24 6 6 24 q-8 8 -22 6 l-78 0 q-22 2 -22 -16 q0 -16 18 -18 Z"
        fill="#F6F2E8" stroke="#15224A" stroke-width="5" stroke-linejoin="round"/>

  <!-- light beams -->
  <path d="M300 168 L150 96 L168 176 Z" fill="#F2CB63" opacity="0.5"/>
  <path d="M300 168 L452 100 L432 178 Z" fill="#F2CB63" opacity="0.5"/>

  <!-- sea -->
  <path d="M0 452 q80 -22 150 0 t150 0 t150 0 t150 0 L600 560 L0 560 Z" fill="#3457B8"/>
  <g stroke="#15224A" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.65">
    <path d="M70 500 q18 -14 36 0"/>
    <path d="M470 510 q18 -14 36 0"/>
    <path d="M250 526 q18 -14 36 0"/>
  </g>

  <!-- rock -->
  <path d="M196 452 q24 -44 104 -44 q80 0 104 44 q-26 22 -104 22 q-78 0 -104 -22 Z"
        fill="#C2B79C" stroke="#15224A" stroke-width="6" stroke-linejoin="round"/>

  <!-- tower -->
  <defs>
    <clipPath id="tower">
      <path d="M254 446 C252 362 266 282 270 200 L330 200 C334 282 348 362 346 446 Z"/>
    </clipPath>
  </defs>
  <path d="M254 446 C252 362 266 282 270 200 L330 200 C334 282 348 362 346 446 Z" fill="#F6F2E8"/>
  <g clip-path="url(#tower)">
    <rect x="244" y="200" width="112" height="44" fill="#1E3FA0"/>
    <rect x="244" y="288" width="112" height="44" fill="#1E3FA0"/>
    <rect x="244" y="376" width="112" height="44" fill="#1E3FA0"/>
  </g>
  <path d="M254 446 C252 362 266 282 270 200 L330 200 C334 282 348 362 346 446 Z"
        fill="none" stroke="#15224A" stroke-width="7" stroke-linejoin="round"/>

  <!-- gallery platform -->
  <path d="M246 192 q54 -10 108 0 l0 14 q-54 8 -108 0 Z"
        fill="#C2B79C" stroke="#15224A" stroke-width="6" stroke-linejoin="round"/>

  <!-- lantern room (glass) -->
  <rect x="266" y="150" width="68" height="44" rx="6" fill="#FBF7EE" stroke="#15224A" stroke-width="6"/>
  <!-- lamp glow + green beacon -->
  <circle cx="300" cy="172" r="22" fill="#6FD39C" opacity="0.55"/>
  <circle cx="300" cy="172" r="12" fill="#2BA866" stroke="#15224A" stroke-width="4"/>
  <!-- window mullions -->
  <line x1="288" y1="152" x2="288" y2="192" stroke="#15224A" stroke-width="4"/>
  <line x1="312" y1="152" x2="312" y2="192" stroke="#15224A" stroke-width="4"/>

  <!-- roof -->
  <path d="M258 150 L342 150 L300 112 Z" fill="#1E3FA0" stroke="#15224A" stroke-width="7" stroke-linejoin="round"/>
  <!-- topper + little flag -->
  <line x1="300" y1="112" x2="300" y2="86" stroke="#15224A" stroke-width="6" stroke-linecap="round"/>
  <path d="M300 88 q22 4 30 12 q-14 8 -30 8 Z" fill="#2BA866" stroke="#15224A" stroke-width="5" stroke-linejoin="round"/>
</svg>
